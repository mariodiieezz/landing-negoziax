server {
    listen 80;
    server_name negoziax.com www.negoziax.com;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Home: servir index sin URL canónica que choque con /index.html (evita ERR_TOO_MANY_REDIRECTS)
    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        return 301 /;
    }

    location = /logo.png {
        return 301 /assets/logo.png;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    rewrite ^/servicios\.html$ /servicios permanent;
    rewrite ^/casos\.html$ /casos permanent;
    rewrite ^/caso-clinica\.html$ /caso-clinica permanent;
    rewrite ^/caso-taller\.html$ /caso-taller permanent;
    rewrite ^/caso-academia\.html$ /caso-academia permanent;

    location = /servicios { try_files /servicios.html =404; }
    location = /casos { try_files /casos.html =404; }
    location = /caso-clinica { try_files /caso-clinica.html =404; }
    location = /caso-taller { try_files /caso-taller.html =404; }
    location = /caso-academia { try_files /caso-academia.html =404; }

    error_page 404 /404.html;
    location = /404.html { internal; }

    location / {
        try_files $uri $uri/ =404;
    }
}
