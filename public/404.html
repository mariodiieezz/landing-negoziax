<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --slate-900:#0f172a;
  --slate-800:#1e293b;
  --slate-700:#334155;
  --slate-600:#475569;
  --slate-500:#64748b;
  --slate-400:#94a3b8;
  --slate-300:#cbd5e1;
  --slate-200:#e2e8f0;
  --slate-100:#f1f5f9;
  --slate-50:#f8fafc;
  --blue-400:#3b82f6;
  --blue-500:#2563eb;
  --blue-600:#2563eb;
  --green-500:#10b981;
  --green-600:#16a34a;
  --red-500:#ef4444;
  --white:#ffffff;
}

html{scroll-behavior:smooth}

::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:#2563eb}

body{
  font-family:'DM Sans',system-ui,sans-serif;
  color:var(--slate-900);
  background:linear-gradient(180deg,#eaeff5 0%,#e4eaf2 100%);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
}

h1,h2,h3,h4{
  font-family:'Outfit',system-ui,sans-serif;
  font-weight:700;
  letter-spacing:-0.03em;
  line-height:1.08;
}

/* DECORATIVE PARALLAX SHAPES */
.bg-shapes{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.shape{
  position:absolute;border-radius:50%;
  filter:blur(40px);opacity:.5;
  will-change:transform;
}
.shape-1{
  width:480px;height:480px;
  background:radial-gradient(circle,rgba(59,130,246,.09),transparent 70%);
  top:-10%;right:-15%;
}
.shape-2{
  width:380px;height:380px;
  background:radial-gradient(circle,rgba(96,165,250,.07),transparent 70%);
  top:55%;left:-12%;
}
.shape-3{
  width:420px;height:420px;
  background:radial-gradient(circle,rgba(30,41,59,.04),transparent 70%);
  top:130%;right:5%;
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;z-index:100;
  padding:.95rem .5rem;
  transition:background .4s ease,border-color .4s ease,box-shadow .4s ease;
  border-bottom:1px solid transparent;
}
nav.scrolled{
  background:rgba(255,255,255,.78);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-color:rgba(15,23,42,.06);
}
.nav-inner{
  max-width:1180px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;
  gap:2rem;
}
.nav-logo{
  display:inline-flex;align-items:center;
  text-decoration:none;color:inherit;
  flex-shrink:0;
}
.nav-logo svg{width:49px;height:49px;display:block}
.nav-links{
  display:flex;align-items:center;gap:.25rem;
  list-style:none;
}
.nav-links a{
  position:relative;display:inline-block;
  padding:.55rem .9rem;
  font-family:'DM Sans',sans-serif;
  font-size:.85rem;font-weight:500;
  color:var(--slate-600);
  text-decoration:none;
  letter-spacing:.005em;
  transition:color .2s ease;
}
.nav-links a::after{
  content:'';
  position:absolute;left:.9rem;right:.9rem;bottom:.25rem;
  height:2px;border-radius:2px;
  background:var(--blue-500);
  transform:scaleX(0);transform-origin:left center;
  transition:transform .35s cubic-bezier(.25,.1,.25,1);
}
.nav-links a:hover{color:var(--blue-500)}
.nav-links a.active{color:var(--blue-500)}
.nav-links a.active::after{transform:scaleX(1)}

.nav-burger{
  display:none;
  align-items:center;justify-content:center;
  width:44px;height:44px;
  border-radius:12px;
  background:transparent;
  border:1px solid var(--slate-200);
  color:var(--slate-700);
  cursor:pointer;
}
.nav-burger svg{width:22px;height:22px}

/* Mobile nav */
.nav-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.35);
  opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:101;
}
.nav-overlay.open{opacity:1;pointer-events:auto}
.nav-mobile{
  position:fixed;top:0;right:0;height:100%;
  width:min(320px,85vw);
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:6rem 1.75rem 2rem;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.25,.1,.25,1);
  z-index:102;
}
.nav-mobile.open{transform:translateX(0)}
.nav-mobile ul{list-style:none;display:flex;flex-direction:column;gap:.25rem}
.nav-mobile a{
  display:block;padding:.85rem .5rem;
  font-family:'DM Sans',sans-serif;
  font-size:1.05rem;font-weight:500;
  color:var(--slate-700);
  text-decoration:none;
  border-bottom:1px solid var(--slate-100);
}
.nav-mobile a:hover{color:var(--blue-500)}

/* BRAND TYPOGRAPHY */
.brand{font-family:'Outfit',sans-serif;font-weight:800;letter-spacing:-0.04em;font-size:1.6rem;display:inline-flex;align-items:center}
.b-1{color:#e2e8f0}.b-2{color:#3b82f6}.b-3{color:#e2e8f0}
.brand--footer{font-size:1.5rem}

/* LAYOUT */
.container{max-width:1200px;margin:0 auto;padding:0 2rem;position:relative;z-index:1}
.section{padding:5rem 2rem;position:relative;z-index:1;overflow:hidden;background:transparent}
.section .container{text-align:center}

/* TYPOGRAPHY HELPERS */
.eyebrow{
  display:inline-block;
  font-family:'DM Sans',sans-serif;
  font-size:.78rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--blue-500);
  margin-bottom:1rem;
  padding:.35rem .75rem;
  background:rgba(59,130,246,.08);
  border-radius:999px;
}
.section-heading{
  font-size:clamp(2rem,4.2vw,3rem);
  color:var(--slate-900);
  margin:0 auto 1.1rem auto;
  letter-spacing:-0.035em;
  text-align:center;
}
.section-sub{
  font-size:1.1rem;
  color:var(--slate-600);
  line-height:1.75;
  margin:0 auto 3rem auto;
  max-width:680px;
  text-align:center;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:9rem 1.75rem 8rem;
  text-align:center;
  position:relative;
  background:linear-gradient(180deg,#eaeff5 0%,#e0e8f2 40%,#d8e2ee 100%);
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(59,130,246,.04) 1px,transparent 1px);
  background-size:32px 32px;
  z-index:0;
  pointer-events:none;
}
.hero-blob-1{
  position:absolute;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(96,165,250,.10),transparent 70%);
  top:-15%;right:-10%;
  filter:blur(60px);
  z-index:0;
  pointer-events:none;
}
.hero-blob-2{
  position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.08),transparent 70%);
  bottom:-10%;left:-8%;
  filter:blur(50px);
  z-index:0;
  pointer-events:none;
}
.hero-blob-3{
  position:absolute;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(147,197,253,.07),transparent 70%);
  top:40%;left:50%;
  transform:translate(-50%,-50%);
  filter:blur(40px);
  z-index:0;
  pointer-events:none;
}
.hero-inner{max-width:840px;margin:0 auto;position:relative;z-index:3}
.hero-title{
  font-size:clamp(2.6rem,7.5vw,5.4rem);
  margin-bottom:1.5rem;
  letter-spacing:-0.045em;
  font-weight:800;
  line-height:1.1;
}
.title-line{
  display:block;
  color:var(--slate-900);
  font-style:normal;
  font-weight:800;
  opacity:0;
  transform:translateY(40px);
  animation:heroSlideUp 0.8s ease-out forwards;
}
.title-line:nth-child(1){animation-delay:0s}
.title-line:nth-child(2){animation-delay:0.2s}
.title-line:nth-child(3){animation-delay:0.4s}
.title-line.title-blue{
  color:var(--blue-500);
}
@keyframes heroSlideUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}
.hero-sub{
  font-size:1.2rem;
  color:var(--slate-600);
  line-height:1.7;
  margin:0 auto 1.5rem;
  font-weight:400;
  max-width:620px;
  opacity:0;
  transform:translateY(40px);
  animation:heroSlideUp 0.8s ease-out 0.6s forwards;
}
.hero-cta-btn{
  display:inline-flex;
  align-items:center;
  gap:.75rem;
  background:var(--blue-500);
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:1.1rem;
  font-weight:600;
  text-decoration:none;
  padding:1rem 2.25rem;
  border-radius:50px;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
  opacity:0;
  transform:translateY(40px);
  animation:heroSlideUp 0.8s ease-out 0.6s forwards;
  transition:transform .25s ease,box-shadow .25s ease;
}
.hero-cta-btn:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 12px 32px rgba(37,99,235,.55);
  background:#1d4ed8;
}
.hero-cta-btn:active{
  transform:translateY(-1px) scale(1.01);
}
.hero-cta-btn svg{flex-shrink:0;transition:transform .3s ease}
.hero-cta-btn:hover svg{transform:rotate(20deg) scale(1.15)}
.hero-cta-btn--glow{
  box-shadow:0 4px 14px rgba(37,99,235,.5),0 0 40px rgba(37,99,235,.7),0 0 80px rgba(37,99,235,.35),0 0 120px rgba(37,99,235,.15);
}
.hero-cta-btn--glow:hover{
  box-shadow:0 12px 32px rgba(37,99,235,.7),0 0 50px rgba(37,99,235,.9),0 0 100px rgba(37,99,235,.5),0 0 160px rgba(37,99,235,.2);
}
.hero-cta-secondary{
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  font-family:'DM Sans',sans-serif;
  font-size:1.05rem;
  font-weight:600;
  color:var(--slate-700);
  text-decoration:none;
  padding:.95rem 2rem;
  border-radius:50px;
  border:1.5px solid var(--slate-300);
  background:transparent;
  opacity:0;
  transform:translateY(40px);
  animation:heroSlideUp 0.8s ease-out 0.75s forwards;
  transition:border-color .25s,color .25s,background .25s;
}
.hero-cta-secondary:hover{
  border-color:var(--blue-500);
  color:var(--blue-500);
  background:rgba(59,130,246,.04);
}

/* GLASS CARDS */
.pain-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:1.5rem;margin-top:3rem;
}
.pain-card{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border:1px solid rgba(59,130,246,.2);
  border-radius:20px;
  padding:2.5rem 2rem;
  text-align:left;
  transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
}
.pain-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 30px rgba(59,130,246,.08);
  border-color:#93c5fd;
}
.pain-card-icon{
  width:48px;
  height:48px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(96,165,250,.06));
  color:var(--blue-500);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 0 1.25rem;
}
#servicios .pain-card{text-align:left}
#servicios .pain-card-icon{margin:0 0 1.25rem}
.pain-card h3{font-size:1.15rem;margin-bottom:.55rem;letter-spacing:-0.02em;color:#fff}
.pain-card p{font-size:.94rem;color:rgba(255,255,255,.65);line-height:1.7}

/* METRICS BAR */
.metrics-bar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  background:transparent;
  width:100%;
}
.metric-item{
  text-align:center;
  padding:1.5rem .75rem;
  border-right:1px solid var(--slate-200);
  transition:background .25s;
}
.metric-item:last-child{border-right:none}
.metric-num{
  font-family:'Outfit',sans-serif;
  font-size:36px;font-weight:700;letter-spacing:-0.02em;
  color:var(--blue-500);
  line-height:1;
}
.metric-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--slate-500);
  line-height:1.4;
  margin-top:12px;
}
@media(max-width:768px){
  .metrics-bar{grid-template-columns:repeat(2,1fr)}
  .metric-item{border-right:none;border-bottom:1px solid var(--slate-200)}
  .metric-item:nth-child(2n){border-right:none}
  .metric-item:nth-child(1),.metric-item:nth-child(3){border-right:1px solid var(--slate-200)}
  .metric-item:last-child{border-bottom:none}
}


/* TESTIMONIOS */
.rating-header{display:flex;align-items:center;justify-content:center;gap:.75rem;margin:1.5rem 0 2.5rem}
.rating-header .stars{color:var(--blue-500);font-size:1.5rem;letter-spacing:2px}
.rating-score{font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:700;color:var(--blue-500)}
.testimonials-wrapper{overflow:hidden;margin-top:2rem}
.testimonials-track{display:flex;gap:1.5rem;animation:scrollTestimonials 35s linear infinite;width:max-content}
.testimonials-wrapper:hover .testimonials-track{animation-play-state:paused}
@keyframes scrollTestimonials{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.testimonial-card{flex-shrink:0;width:280px;background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:1.25rem;position:relative;text-align:left}
.testimonial-stars{color:var(--blue-500);font-size:1.1rem;letter-spacing:2px;margin-bottom:0}
.testimonial-text{color:rgba(255,255,255,.8);font-size:.88rem;line-height:1.7;margin-bottom:.75rem}
.testimonial-author{display:flex;flex-direction:column;gap:.25rem}
.author-name{color:#fff;font-weight:600;font-size:.95rem}
.author-role{color:rgba(255,255,255,.45);font-size:.85rem}
.testimonial-card hr{border:none!important;border-top:1px solid rgba(255,255,255,.08)!important;margin:.75rem 0!important}
.testimonial-badge{background:var(--blue-500);color:#fff;font-size:.75rem;font-weight:600;padding:.35rem .75rem;border-radius:999px;flex-shrink:0}

/* FAQ */
.faq-list{margin:3rem auto 0;max-width:780px}
.faq-item{
  border:1px solid rgba(59,130,246,.2);
  border-radius:20px;
  margin-bottom:.75rem;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  overflow:hidden;
  transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
}
.faq-item:hover{border-color:#93c5fd}
.faq-item.open{
  border-color:#93c5fd;
  box-shadow:0 12px 36px -16px rgba(59,130,246,.2);
}
.faq-btn{
  width:100%;background:none;border:none;
  padding:1.3rem 1.5rem;
  display:flex;justify-content:space-between;align-items:center;gap:1rem;
  cursor:pointer;
  font-family:'Outfit',sans-serif;
  font-size:1rem;font-weight:600;letter-spacing:-0.015em;
  color:#fff;text-align:left;
  transition:color .2s;
}
.faq-btn:hover{color:var(--blue-500)}
.faq-icon{flex-shrink:0;color:var(--slate-500);transition:transform .35s cubic-bezier(.25,.1,.25,1)}
.faq-item.open .faq-icon{transform:rotate(180deg);color:var(--blue-500)}
.faq-body{overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1)}
.faq-body p{
  font-size:.95rem;color:rgba(255,255,255,.65);line-height:1.75;
  padding:0 1.5rem 1.4rem;
  text-align:left;
}

/* CTA */
.cta-section{padding:5rem 1.75rem 7rem;position:relative;z-index:1}
.cta-box{
  background:linear-gradient(135deg,var(--slate-900) 0%,#0b1220 100%);
  border-radius:28px;
  padding:5rem 2.5rem;text-align:center;
  max-width:880px;margin:0 auto;
  position:relative;overflow:hidden;
}
.cta-box::before{
  content:'';position:absolute;
  top:-50%;right:-20%;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.18),transparent 70%);
  pointer-events:none;
}
.cta-box::after{
  content:'';position:absolute;
  bottom:-50%;left:-20%;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(96,165,250,.12),transparent 70%);
  pointer-events:none;
}
.cta-box>*{position:relative;z-index:1}
.cta-box .eyebrow{background:rgba(255,255,255,.08);color:var(--blue-400)}
.cta-box h2{
  color:#fff;font-size:clamp(1.9rem,4vw,2.9rem);
  margin-bottom:1rem;letter-spacing:-0.04em;
}
.cta-box p{
  color:rgba(255,255,255,.7);
  font-size:1.1rem;line-height:1.75;
  max-width:560px;margin:0 auto;
}

/* FOOTER */
.footer-full{
  background:var(--slate-900);
  color:#cbd5e1;
  padding:4rem 1.75rem 2rem;
  border-top:1px solid rgba(255,255,255,.06);
}
.footer-grid{
  max-width:1180px;margin:0 auto;
  display:grid;
  grid-template-columns:1.5fr 1fr 1fr 1fr;
  gap:2.5rem 2rem;
  margin-bottom:3rem;
  justify-items:start;
}
.footer-brand{grid-column:span 1}
.footer-brand .brand--footer{margin-bottom:1rem}
.footer-brand>p{font-size:.95rem;color:#94a3b8;line-height:1.7;margin-bottom:1.25rem}
.footer-contact-info{display:flex;flex-direction:column;gap:.5rem;margin-top:1rem}
.footer-contact-info>div{display:flex;align-items:center;gap:.6rem}
.footer-contact-info span,.footer-contact-info a{font-size:.85rem;color:var(--slate-400);text-decoration:none;transition:color .2s}
.footer-contact-info a:hover{color:#3b82f6}
.footer-trust-bar{max-width:1200px;margin:2rem auto 0;padding:1.5rem 0;border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
.footer-trust-bar>span{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--slate-400)}
.footer-socials{display:flex;gap:.75rem}
.footer-socials a{
  width:36px;height:36px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
  color:#cbd5e1;
  transition:background .2s ease,color .2s ease;
}

/* WA FAB */
.wa-fab{

  transition:transform .2s ease,box-shadow .2s ease;
  text-decoration:none;
}
.wa-fab:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(37,211,102,.45)}

/* BACK TO TOP BUTTON */
.back-to-top{

  z-index:200;
  cursor:pointer;
  border:none;
  opacity:0;visibility:hidden;
  transform:translateY(10px);
  transition:opacity .3s ease,transform .3s ease,visibility .3s ease,box-shadow .25s;
}
.back-to-top.visible{
  opacity:1;visibility:visible;
  transform:translateY(0);
}
.back-to-top:hover{
  box-shadow:0 6px 16px rgba(0,0,0,.2);

/* CALCULATOR */
.calc-card{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border:1px solid rgba(59,130,246,.2);
  border-radius:20px;
  padding:2.5rem 2rem;
  max-width:680px;
  margin:3rem auto 0;
  text-align:center;
  transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
}
.calc-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 30px rgba(59,130,246,.08);
  border-color:#93c5fd;
}
.calc-group{margin-bottom:2rem}
.calc-lbl{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:.65rem;
}
.calc-lbl-text{font-size:.93rem;font-weight:500;color:rgba(255,255,255,.75)}
.calc-lbl-val{
  font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;
  color:#3b82f6;min-width:2.5rem;text-align:right;
}
.calc-range{
  width:100%;accent-color:#3b82f6;cursor:pointer;
  appearance:none;-webkit-appearance:none;
  height:6px;border-radius:4px;
  background:var(--slate-200);outline:none;
}
.calc-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#3b82f6;cursor:pointer;
  box-shadow:0 0 0 3px rgba(59,130,246,.2);
  transition:box-shadow .2s;
}
.calc-range::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(59,130,246,.25)}
.calc-result{
  background:rgba(59,130,246,.08);
  border:1.5px solid rgba(59,130,246,.2);
  border-radius:18px;
  padding:2rem 1.5rem;
  margin-top:2.5rem;
  display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;text-align:center;
  transition:border-color .25s,box-shadow .25s;
}
.calc-result:hover{border-color:#93c5fd;box-shadow:0 0 30px rgba(59,130,246,.08)}
.calc-result-lbl{font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:.35rem;line-height:1.4}
.calc-result-num{
  font-family:'Outfit',sans-serif;
  font-size:2.6rem;font-weight:700;letter-spacing:-0.04em;
  color:var(--blue-500);line-height:1;margin-bottom:.3rem;
}
.calc-result-unit{font-size:.85rem;color:rgba(255,255,255,.6)}
#calcMsg{color:rgba(255,255,255,.7)}

/* SERVICE BULLETS */
.service-bullets{list-style:none;margin-top:.75rem;display:flex;flex-direction:column;gap:.35rem;text-align:left}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  z-index:10000;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{
  background:#fff;
  max-width:700px;width:100%;
  max-height:85vh;
  border-radius:14px;
  padding:2rem;
  overflow-y:auto;
  position:relative;
  transform:translateY(16px);
  transition:transform .25s ease;
}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-close{
  position:sticky;top:0;float:right;
  background:none;border:none;cursor:pointer;
  font-size:1.6rem;line-height:1;
  color:var(--slate-400);padding:.1rem .4rem;
  transition:color .2s;
}
.modal-close:hover{color:var(--slate-900)}
.modal-box h2{font-size:1.35rem;margin-bottom:1.25rem;color:var(--slate-900);letter-spacing:-0.02em}
.modal-box h3{font-size:.95rem;font-weight:600;margin:1.25rem 0 .4rem;color:var(--slate-800)}
.modal-box p{font-size:.9rem;color:var(--slate-600);line-height:1.7;margin-bottom:.5rem}
.modal-box ul{padding-left:1.25rem;margin-bottom:.75rem}
.modal-box li{font-size:.9rem;color:var(--slate-600);line-height:1.7;margin-bottom:.2rem}
.modal-link{
  background:none;border:none;cursor:pointer;
  color:var(--slate-500);font-size:.8rem;font-family:inherit;
  text-decoration:underline;text-underline-offset:3px;
  transition:color .2s;padding:0;
}
.modal-link:hover{color:var(--blue-500)}
